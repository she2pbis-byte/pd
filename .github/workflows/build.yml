name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Project
        run: |
          npx cap add android || true
          
      - name: Generate App Icons
        run: |
          # Создаем временную структуру для генератора
          mkdir -p assets/android
          # Копируем вашу иконку в нужное место
          cp www/icon.png assets/icon.png
          # Генерируем все размеры иконок для Android
          npx @capacitor/assets generate --android --assetPath assets

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PsovskieOtvety-With-Icon
          path: android/app/build/outputs/apk/debug/app-debug.apk
