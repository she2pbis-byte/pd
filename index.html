<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСОВСКИЕ ОТВЕТЫ</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- Цвет статус-бара -->
    <meta id="theme-color-meta" name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }

        .header-container {
            margin-top: 20px;
            margin-bottom: 10px;
            background: transparent;
            text-align: center;
            width: 100%;
            z-index: 1001;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
        }

        /* Контейнеры для кнопок */
        .buttons-container {
            width: 90%;
            max-width: 400px;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        /* Список в один столбец для согласия */
        .buttons-list {
            display: none; /* Скрыто по умолчанию */
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .grid-button {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid white;
            color: white;
            padding: 12px 10px; 
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            border-radius: 12px; 
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        .grid-button:active {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(0.96);
        }

        #analysis-canvas {
            display: none;
        }

        .content {
            margin-top: 15px;
            text-align: center;
            opacity: 0.8;
            font-size: 0.9rem;
            padding-bottom: 30px;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .show-animated {
            display: flex !important;
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <canvas id="analysis-canvas"></canvas>

    <div class="header-container">
        <h1 id="main-title">ПСОВСКИЕ ОТВЕТЫ</h1>
    </div>

    <div class="buttons-container">
        <!-- Главная сетка -->
        <div id="main-grid" class="buttons-grid">
            <button class="grid-button">1</button>
            <button class="grid-button">2</button>
            <button class="grid-button">3</button>
            <button class="grid-button">4</button>
            <button class="grid-button">5</button>
            <button class="grid-button">6</button>
            <button class="grid-button">7</button>
            <button class="grid-button">8</button>
            <button id="soglasie-trigger" class="grid-button">СОГЛАСИЕ</button>
            <button class="grid-button">10</button>
        </div>

        <!-- Список "Согласие" -->
        <div id="soglasie-list" class="buttons-list">
            <button class="grid-button audio-btn" data-file="вопросов нуль">вопросов нуль</button>
            <button class="grid-button audio-btn" data-file="гениально">гениально</button>
            <button class="grid-button audio-btn" data-file="доверяю но">доверяю но</button>
            <button class="grid-button audio-btn" data-file="не поспоришь">не поспоришь</button>
            <button class="grid-button audio-btn" data-file="похоже правда">похоже правда</button>
            <button class="grid-button audio-btn" data-file="принимаю условия">принимаю условия</button>
            <!-- Добавил кнопку назад для удобства -->
            <button id="back-btn" class="grid-button" style="border-color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-top: 10px;">назад</button>
        </div>
    </div>

    <div class="content">
        <p id="hint-text">Выберите номер ответа</p>
    </div>

    <script>
        // 1. Динамический цвет темы
        function updateThemeColor() {
            const img = new Image();
            img.src = 'fon.png';
            img.crossOrigin = "Anonymous"; 

            img.onload = function() {
                const canvas = document.getElementById('analysis-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = 1;
                ctx.drawImage(img, 0, 0, img.width, 1, 0, 0, img.width, 1);
                const imageData = ctx.getImageData(0, 0, img.width, 1).data;
                let r = 0, g = 0, b = 0;
                const count = imageData.length / 4;
                for (let i = 0; i < imageData.length; i += 4) {
                    r += imageData[i]; g += imageData[i + 1]; b += imageData[i + 2];
                }
                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);
                const hexColor = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                document.getElementById('theme-color-meta').setAttribute('content', hexColor);
                document.body.style.backgroundColor = hexColor;
            };

            img.onerror = function() {
                document.body.style.backgroundColor = "#121212";
            };
        }

        // 2. Логика интерфейса
        const mainGrid = document.getElementById('main-grid');
        const soglasieList = document.getElementById('soglasie-list');
        const trigger = document.getElementById('soglasie-trigger');
        const backBtn = document.getElementById('back-btn');
        const hintText = document.getElementById('hint-text');

        // Переход в режим "Согласие"
        trigger.addEventListener('click', () => {
            mainGrid.style.display = 'none';
            soglasieList.classList.add('show-animated');
            hintText.innerText = 'Раздел: СОГЛАСИЕ';
        });

        // Возврат назад
        backBtn.addEventListener('click', () => {
            soglasieList.classList.remove('show-animated');
            soglasieList.style.display = 'none';
            mainGrid.style.display = 'grid';
            hintText.innerText = 'Выберите номер ответа';
        });

        // 3. Воспроизведение аудио
        let currentAudio = null;

        document.querySelectorAll('.audio-btn').forEach(button => {
            button.addEventListener('click', function() {
                const fileName = this.getAttribute('data-file');
                const audioPath = `soglasie/${fileName}.mp3`;

                // Останавливаем текущее аудио, если оно играет
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }

                const audio = new Audio(audioPath);
                currentAudio = audio;

                audio.play().catch(error => {
                    console.error("Ошибка воспроизведения:", error);
                    // На мобильных устройствах автовоспроизведение требует первого клика пользователя
                });

                // Визуальный эффект при проигрывании
                this.style.borderColor = "#ffcc00";
                audio.onended = () => {
                    this.style.borderColor = "white";
                };
            });
        });

        window.onload = updateThemeColor;
    </script>
</body>
</html>
