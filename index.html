<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/x-icon" href="ico.ico">
    
    <meta name="theme-color" id="status-bar-color" content="#000000">
    <title>Псовские ответы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Контейнер фона */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Установлено название fon.png */
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: opacity 0.8s ease-out, transform 1.2s ease-out;
            opacity: 0;
            transform: scale(1.05);
        }

        .bg-container.loaded {
            opacity: 1;
            transform: scale(1);
        }

        header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .title-text {
            color: white;
            font-size: 0.75rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
            text-shadow: 0 2px 20px rgba(0,0,0,0.9);
            padding: 20px;
        }

        body {
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bg" class="bg-container"></div>
    <div class="overlay"></div>

    <header>
        <h1 class="title-text">Псовские ответы</h1>
    </header>

    <script>
        const statusBar = document.getElementById('status-bar-color');
        const bgContainer = document.getElementById('bg');

        function initApp() {
            // Установлено название fon.png для JS загрузчика
            const fileName = 'fon.png';
            const img = new Image();
            
            img.crossOrigin = "Anonymous";
            img.src = fileName;

            img.onload = function() {
                bgContainer.classList.add('loaded');
                
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1;
                    canvas.height = 1;
                    
                    // Берем пиксель для адаптации цвета статус-бара
                    ctx.drawImage(img, img.width / 2, 10, 1, 1, 0, 0, 1, 1);
                    const data = ctx.getImageData(0, 0, 1, 1).data;
                    
                    const hex = "#" + ((1 << 24) + (data[0] << 16) + (data[1] << 8) + data[2]).toString(16).slice(1);
                    
                    statusBar.setAttribute('content', hex);
                    document.body.style.backgroundColor = hex;
                } catch (e) {
                    document.body.style.backgroundColor = '#000000';
                }
            };

            img.onerror = () => {
                console.error("Файл " + fileName + " не найден.");
                statusBar.setAttribute('content', '#1a1a1a');
                bgContainer.style.background = 'linear-gradient(135deg, #1a1a1a, #000000)';
                bgContainer.classList.add('loaded');
            };
        }

        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
