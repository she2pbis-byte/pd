<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСОВСКИЕ ОТВЕТЫ</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- Цвет статус-бара (будет обновлен скриптом) -->
    <meta id="theme-color-meta" name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* Цвет фона будет обновлен скриптом для плавного перехода */
            background-color: #000; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        .header-container {
            margin-top: 12px;
            background: transparent;
            text-align: center;
            width: 100%;
            z-index: 1001;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* Невидимый холст для анализа пикселей */
        #analysis-canvas {
            display: none;
        }

        .content {
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="analysis-canvas"></canvas>

    <div class="header-container">
        <h1>ПСОВСКИЕ ОТВЕТЫ</h1>
    </div>

    <div class="content">
        <p>Добро пожаловать на страницу.</p>
    </div>

    <script>
        function updateThemeColor() {
            const img = new Image();
            img.src = 'fon.png';
            img.crossOrigin = "Anonymous"; // На случай, если файл загружается извне

            img.onload = function() {
                const canvas = document.getElementById('analysis-canvas');
                const ctx = canvas.getContext('2d');
                
                // Нам нужен только самый верхний ряд пикселей (1x1 достаточно для среднего значения)
                canvas.width = img.width;
                canvas.height = 1;
                
                ctx.drawImage(img, 0, 0, img.width, 1, 0, 0, img.width, 1);
                
                // Получаем данные пикселей первого ряда
                const imageData = ctx.getImageData(0, 0, img.width, 1).data;
                
                let r = 0, g = 0, b = 0;
                const count = imageData.length / 4;

                for (let i = 0; i < imageData.length; i += 4) {
                    r += imageData[i];
                    g += imageData[i + 1];
                    b += imageData[i + 2];
                }

                // Вычисляем средний цвет верхнего края
                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                const hexColor = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);

                // Применяем цвет к мета-тегу статус-бара
                document.getElementById('theme-color-meta').setAttribute('content', hexColor);
                
                // Также подкрашиваем фон body для бесшовности
                document.body.style.backgroundColor = hexColor;
                
                console.log("Status bar color updated to:", hexColor);
            };

            img.onerror = function() {
                console.error("Не удалось загрузить fon.png для анализа цвета.");
            };
        }

        window.onload = updateThemeColor;
    </script>
</body>
</html>
