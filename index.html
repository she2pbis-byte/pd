<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="ico.ico">
    
    <meta name="theme-color" id="status-bar-color" content="#000000">
    <title>Псовские ответы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000000; 
            margin: 0;
            padding: 0;
            color: white;
            touch-action: manipulation;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .sound-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .sound-button:active {
            transform: scale(0.92);
        }
        .playing {
            animation: pulse 1.5s infinite;
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.15);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .progress-bar {
            height: 3px;
            background: #ffffff;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            transition: width 0.1s linear;
        }
        .text-shadow {
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-6">
        <header class="mb-8 flex flex-col items-center justify-center text-center">
            <h1 class="text-base font-light text-white tracking-[0.3em] uppercase text-shadow mb-2">
                Псовские ответы
            </h1>
        </header>

        <!-- Grid -->
        <div id="soundGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5 pb-20">
            
            <!-- Пример ручной кнопки -->
            <button class="sound-button bg-black/30 backdrop-blur-xl border border-white/5 p-5 rounded-3xl flex flex-col items-center justify-center text-center hover:bg-black/50 transition-all h-40 relative overflow-hidden group shadow-2xl" 
                    onclick="playSound(this, 'audio1.mp3')">
                <div class="w-14 h-14 bg-white/5 rounded-full flex items-center justify-center mb-4 group-hover:bg-white/10 transition-all duration-300">
                    <span class="text-2xl opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-transform">🐕</span>
                </div>
                <span class="text-[11px] font-medium text-white/70 uppercase tracking-tighter leading-tight px-2">
                    Гав-Гав
                </span>
                <div class="progress-bar"></div>
            </button>

            <!-- Добавляйте новые кнопки здесь по такому же шаблону -->

        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar-color');
        let currentAudio = null;

        // Универсальная функция воспроизведения для кнопок
        function playSound(btn, audioUrl) {
            // Если уже играет этот же звук - сбрасываем, если другой - останавливаем старый
            if (currentAudio && currentAudio.src.includes(audioUrl)) {
                currentAudio.currentTime = 0;
            } else {
                if (currentAudio) {
                    currentAudio.pause();
                    document.querySelectorAll('.sound-button').forEach(b => b.classList.remove('playing'));
                }
                currentAudio = new Audio(audioUrl);
            }

            const progressBar = btn.querySelector('.progress-bar');
            
            currentAudio.play().catch(e => console.log("Interaction required"));

            currentAudio.onplay = () => btn.classList.add('playing');
            currentAudio.onended = () => {
                btn.classList.remove('playing');
                progressBar.style.width = '0%';
            };
            currentAudio.onpause = () => btn.classList.remove('playing');
            
            currentAudio.ontimeupdate = () => {
                if (currentAudio.duration) {
                    const progress = (currentAudio.currentTime / currentAudio.duration) * 100;
                    progressBar.style.width = `${progress}%`;
                }
            };
        }

        // Автоматическое определение цвета фона
        function updateStatusBarColor() {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = 'fon.png';
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1;
                    canvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1, 0, 0, 1, 1);
                    const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                    const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                    statusBar.setAttribute('content', hex);
                    document.body.style.backgroundColor = hex;
                } catch (e) {
                    console.error(e);
                }
            };
            img.onerror = () => statusBar.setAttribute('content', '#000000');
        }

        updateStatusBarColor();
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
    </script>
</body>
</html>
