<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСОВСКИЕ ОТВЕТЫ</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- Цвет статус-бара (будет обновлен скриптом) -->
    <meta id="theme-color-meta" name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        .header-container {
            margin-top: 20px;
            margin-bottom: 30px;
            background: transparent;
            text-align: center;
            width: 100%;
            z-index: 1001;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
        }

        /* Контейнер для кнопок */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }

        .grid-button {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 20px 0;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
            -webkit-tap-highlight-color: transparent;
        }

        /* Визуальный отклик при нажатии */
        .grid-button:active {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        /* Невидимый холст для анализа пикселей */
        #analysis-canvas {
            display: none;
        }

        .content {
            margin-top: 10px;
            text-align: center;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <canvas id="analysis-canvas"></canvas>

    <div class="header-container">
        <h1>ПСОВСКИЕ ОТВЕТЫ</h1>
    </div>

    <div class="buttons-grid">
        <button class="grid-button">1</button>
        <button class="grid-button">2</button>
        <button class="grid-button">3</button>
        <button class="grid-button">4</button>
        <button class="grid-button">5</button>
        <button class="grid-button">6</button>
        <button class="grid-button">7</button>
        <button class="grid-button">8</button>
        <button class="grid-button">9</button>
        <button class="grid-button">10</button>
    </div>

    <div class="content">
        <p>Выберите номер ответа</p>
    </div>

    <script>
        /**
         * Функция анализирует верхний ряд пикселей фонового изображения
         * и устанавливает соответствующий цвет для статус-бара и фона страницы.
         */
        function updateThemeColor() {
            const img = new Image();
            img.src = 'fon.png';
            img.crossOrigin = "Anonymous"; 

            img.onload = function() {
                const canvas = document.getElementById('analysis-canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.width;
                canvas.height = 1;
                
                ctx.drawImage(img, 0, 0, img.width, 1, 0, 0, img.width, 1);
                
                const imageData = ctx.getImageData(0, 0, img.width, 1).data;
                
                let r = 0, g = 0, b = 0;
                const count = imageData.length / 4;

                for (let i = 0; i < imageData.length; i += 4) {
                    r += imageData[i];
                    g += imageData[i + 1];
                    b += imageData[i + 2];
                }

                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                const hexColor = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);

                document.getElementById('theme-color-meta').setAttribute('content', hexColor);
                document.body.style.backgroundColor = hexColor;
                
                console.log("Status bar color updated to:", hexColor);
            };

            img.onerror = function() {
                console.error("Не удалось загрузить fon.png для анализа цвета.");
                // Дефолтный темный цвет, если картинка не найдена
                document.body.style.backgroundColor = "#121212";
            };
        }

        window.onload = updateThemeColor;
    </script>
</body>
</html>
