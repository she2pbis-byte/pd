<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="ico.ico">
    
    <meta name="theme-color" id="status-bar-color" content="#000000">
    <title>Псовские ответы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            /* Черный цвет фона по умолчанию */
            background-color: #000000; 
            margin: 0;
            padding: 0;
            color: white;
            /* Запрет системных жестов для более "приложения-подобного" вида */
            touch-action: manipulation;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .sound-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .sound-button:active {
            transform: scale(0.92);
        }
        .playing {
            animation: pulse 1.5s infinite;
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.15);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .progress-bar {
            height: 3px;
            background: #ffffff;
            position: absolute;
            bottom: 0;
            left: 0;
            transition: width 0.1s linear;
        }
        .text-shadow {
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
        }
        /* Скрытие полосы прокрутки */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="mb-16 flex flex-col items-center justify-center text-center">
            <h1 class="text-3xl font-light text-white tracking-[0.3em] uppercase text-shadow mb-2">
                Псовские ответы
            </h1>
        </header>

        <!-- Grid -->
        <div id="soundGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5 pb-20">
            <!-- Звуки добавляются через JS функцию createSoundButton -->
        </div>
    </div>

    <script>
        const soundGrid = document.getElementById('soundGrid');
        const statusBar = document.getElementById('status-bar-color');

        // Автоматическое определение цвета фона по картинке
        function updateStatusBarColor() {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = 'fon.png';
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1;
                    canvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1, 0, 0, 1, 1);
                    const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                    const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                    statusBar.setAttribute('content', hex);
                    document.body.style.backgroundColor = hex;
                } catch (e) {
                    console.error("Could not extract color from image", e);
                }
            };
            img.onerror = () => {
                statusBar.setAttribute('content', '#000000');
            };
        }

        updateStatusBarColor();

        /**
         * Создает кнопку звука в сетке
         * @param {string} name - Название кнопки
         * @param {string} audioUrl - Путь к аудиофайлу
         */
        function createSoundButton(name, audioUrl) {
            const audio = new Audio(audioUrl);
            audio.volume = 1.0;

            const btn = document.createElement('button');
            btn.className = "sound-button bg-black/30 backdrop-blur-xl border border-white/5 p-5 rounded-3xl flex flex-col items-center justify-center text-center hover:bg-black/50 transition-all h-40 relative overflow-hidden group shadow-2xl";
            
            btn.innerHTML = `
                <div class="w-14 h-14 bg-white/5 rounded-full flex items-center justify-center mb-4 group-hover:bg-white/10 transition-all duration-300">
                    <span class="text-2xl opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-transform">🐕</span>
                </div>
                <span class="text-[11px] font-medium text-white/70 break-words w-full uppercase tracking-tighter leading-tight px-2 overflow-hidden text-ellipsis">${name}</span>
                <div class="progress-bar" style="width: 0%;"></div>
            `;

            btn.onclick = () => {
                // Если звук уже играет, сбрасываем его
                audio.currentTime = 0;
                audio.play().catch(err => {
                    console.warn("Playback prevented. User interaction required.", err);
                });
            };

            audio.onplay = () => btn.classList.add('playing');
            audio.onended = () => {
                btn.classList.remove('playing');
                btn.querySelector('.progress-bar').style.width = '0%';
            };
            audio.onpause = () => btn.classList.remove('playing');
            
            audio.ontimeupdate = () => {
                if (audio.duration) {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    btn.querySelector('.progress-bar').style.width = `${progress}%`;
                }
            };

            soundGrid.appendChild(btn);
        }

        // Пример использования:
        // createSoundButton('Гав', 'bark.mp3');

        // Защита от случайного перетаскивания файлов браузером по умолчанию
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
    </script>
</body>
</html>
