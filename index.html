<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСОВСКИЕ ОТВЕТЫ</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- Цвет статус-бара для мобильных устройств -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Фоновое изображение */
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; /* Резервный цвет */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar-mock {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: env(safe-area-inset-top, 20px);
            background-color: black;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- Имитация черного статус-бара (для визуализации) -->
    <div class="status-bar-mock"></div>

    <div class="container">
        <h1>ПСОВСКИЕ ОТВЕТЫ</h1>
        <p>Добро пожаловать на страницу.</p>
    </div>

    <script>
        // Код для проверки загрузки фона
        window.onload = function() {
            const img = new Image();
            img.src = 'fon.png';
            img.onerror = function() {
                console.warn("Файл fon.png не найден рядом с index.html. Используется черный фон.");
            };
        };
    </script>
</body>
</html>
