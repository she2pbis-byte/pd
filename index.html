<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="ico.ico">
    
    <meta name="theme-color" id="status-bar-color" content="#000000">
    <title>Псовские ответы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Убираем прокрутку */
            background-color: #000000;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        /* Заголовок скрыт визуально, но остается в коде для структуры */
        header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .title-text {
            color: white;
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Фоновое изображение -->
    <div class="bg-container"></div>

    <!-- Минималистичный заголовок -->
    <header>
        <h1 class="title-text">Псовские ответы</h1>
    </header>

    <script>
        const statusBar = document.getElementById('status-bar-color');

        // Автоматическое определение цвета фона для статусбара
        function updateStatusBarColor() {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = 'fon.png';
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1;
                    canvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1, 0, 0, 1, 1);
                    const data = ctx.getImageData(0, 0, 1, 1).data;
                    const r = data[0];
                    const g = data[1];
                    const b = data[2];
                    const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                    
                    statusBar.setAttribute('content', hex);
                    document.body.style.backgroundColor = hex;
                } catch (e) {
                    console.warn("Could not extract color from background, using default black.");
                }
            };
            img.onerror = () => {
                statusBar.setAttribute('content', '#000000');
            };
        }

        window.onload = updateStatusBarColor;
    </script>
</body>
</html>
