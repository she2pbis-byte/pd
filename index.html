<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСОВСКИЕ ОТВЕТЫ</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <meta id="theme-color-meta" name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.5s ease;
            overflow: hidden;
        }

        .app-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            width: 100%;
            padding-top: 40px; 
        }

        .header-container {
            margin-bottom: 20px;
            background: transparent;
            text-align: center;
            width: 100%;
            z-index: 1001;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .buttons-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 7.5px;
            width: 100%;
        }

        .buttons-list {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .grid-button {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 5px 10px; 
            font-size: 1rem; 
            text-align: center;
            cursor: pointer;
            border-radius: 15px; 
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            -webkit-tap-highlight-color: transparent;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 35px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .buttons-list .audio-btn {
            background-color: rgba(255, 255, 255, 0.75); 
            color: #000000; 
            border: 1px solid rgba(255, 255, 255, 0.8);
            font-weight: 800;
            min-height: 46px; 
            font-size: 1rem; 
        }

        #back-btn {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-top: 10px;
            min-height: 50px;
            font-size: 1rem;
        }

        .grid-button:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        /* Обновлено: фон становится менее прозрачным (0.95 вместо 0.3) для лучшей видимости при игре */
        .grid-button.playing {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            background-color: rgba(0, 255, 204, 0.95) !important;
            color: #000000 !important;
            opacity: 1 !important;
        }

        .grid-button.error {
            border-color: #ff4444;
        }

        #analysis-canvas {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .show-animated {
            display: flex !important;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body>
    <canvas id="analysis-canvas"></canvas>

    <div class="app-wrapper">
        <div class="header-container">
            <h1 id="main-title">ПСОВСКИЕ ОТВЕТЫ</h1>
        </div>

        <div class="buttons-container">
            <!-- Главная сетка -->
            <div id="main-grid" class="buttons-grid">
                <button class="grid-button">1</button>
                <button class="grid-button">2</button>
                <button class="grid-button">3</button>
                <button class="grid-button">4</button>
                <button class="grid-button">5</button>
                <button class="grid-button">6</button>
                <button class="grid-button">7</button>
                <button class="grid-button">8</button>
                <button id="soglasie-trigger" class="grid-button" style="background: rgba(255,255,255,0.15); font-weight: bold;">СОГЛАСИЕ</button>
                <button class="grid-button">10</button>
            </div>

            <!-- Список "Согласие" -->
            <div id="soglasie-list" class="buttons-list">
                <button class="grid-button audio-btn" data-file="вопросов нуль">вопросов нуль</button>
                <button class="grid-button audio-btn" data-file="гениально">гениально</button>
                <button class="grid-button audio-btn" data-file="доверяю но">доверяю но</button>
                <button class="grid-button audio-btn" data-file="не поспоришь">не поспоришь</button>
                <button class="grid-button audio-btn" data-file="похоже правда">похоже правда</button>
                <button class="grid-button audio-btn" data-file="принимаю условия">принимаю условия</button>
                <button id="back-btn" class="grid-button">назад</button>
            </div>
        </div>
    </div>

    <script>
        function updateThemeColor() {
            const img = new Image();
            img.src = 'fon.png';
            img.crossOrigin = "Anonymous"; 

            img.onload = function() {
                try {
                    const canvas = document.getElementById('analysis-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = 1;
                    ctx.drawImage(img, 0, 0, img.width, 1, 0, 0, img.width, 1);
                    const imageData = ctx.getImageData(0, 0, img.width, 1).data;
                    let r = 0, g = 0, b = 0;
                    const count = imageData.length / 4;
                    for (let i = 0; i < imageData.length; i += 4) {
                        r += imageData[i]; g += imageData[i + 1]; b += imageData[i + 2];
                    }
                    r = Math.floor(r / count);
                    g = Math.floor(g / count);
                    b = Math.floor(b / count);
                    const hexColor = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                    document.getElementById('theme-color-meta').setAttribute('content', hexColor);
                    document.body.style.backgroundColor = hexColor;
                } catch(e) {
                    console.log("Canvas error:", e);
                }
            };
        }

        const mainGrid = document.getElementById('main-grid');
        const MapList = document.getElementById('soglasie-list');
        const trigger = document.getElementById('soglasie-trigger');
        const backBtn = document.getElementById('back-btn');

        trigger.addEventListener('click', () => {
            mainGrid.style.display = 'none';
            MapList.classList.add('show-animated');
        });

        backBtn.addEventListener('click', () => {
            MapList.classList.remove('show-animated');
            setTimeout(() => {
                MapList.style.display = 'none';
                mainGrid.style.display = 'grid';
            }, 10);
        });

        let currentAudio = null;
        let activeBtn = null;

        document.querySelectorAll('.audio-btn').forEach(button => {
            button.addEventListener('click', function() {
                const fileName = this.getAttribute('data-file');
                const encodedName = encodeURIComponent(fileName);
                const audioPath = `soglasie/${encodedName}.mp3`;

                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }
                if (activeBtn) {
                    activeBtn.classList.remove('playing', 'error');
                }

                const audio = new Audio(audioPath);
                currentAudio = audio;
                activeBtn = this;

                this.classList.add('playing');

                audio.play().catch(error => {
                    console.error("Audio error:", error);
                    this.classList.remove('playing');
                    this.classList.add('error');
                    setTimeout(() => this.classList.remove('error'), 1000);
                });

                audio.onended = () => {
                    this.classList.remove('playing');
                };
            });
        });

        window.onload = updateThemeColor;
    </script>
</body>
</html>
