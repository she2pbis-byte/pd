<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="ico.ico">
    
    <meta name="theme-color" id="status-bar-color" content="#000000">
    <title>Псовские ответы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Путь к вашему файлу */
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: opacity 0.5s ease-in;
            opacity: 0;
        }

        .bg-container.loaded {
            opacity: 1;
        }

        header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .title-text {
            color: white;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.7;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            padding: 10px;
        }

        /* Защита от перетягивания (pull-to-refresh) на мобильных */
        body {
            overscroll-behavior-y: contain;
        }
    </style>
</head>
<body>

    <!-- Фоновое изображение -->
    <div id="bg" class="bg-container"></div>

    <!-- Минималистичный заголовок -->
    <header>
        <h1 class="title-text">Псовские ответы</h1>
    </header>

    <script>
        const statusBar = document.getElementById('status-bar-color');
        const bgContainer = document.getElementById('bg');

        function initApp() {
            const img = new Image();
            // Позволяем загрузку из того же источника
            img.crossOrigin = "Anonymous";
            img.src = 'fon.png';

            img.onload = function() {
                // Плавное появление фона после загрузки
                bgContainer.classList.add('loaded');
                
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1;
                    canvas.height = 1;
                    
                    // Рисуем 1 пиксель из центра изображения для определения среднего цвета
                    ctx.drawImage(img, img.width / 2, img.height / 2, 1, 1, 0, 0, 1, 1);
                    const data = ctx.getImageData(0, 0, 1, 1).data;
                    
                    const r = data[0];
                    const g = data[1];
                    const b = data[2];
                    
                    const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                    
                    // Обновляем мета-тег и фон страницы
                    statusBar.setAttribute('content', hex);
                    document.body.style.backgroundColor = hex;
                } catch (e) {
                    console.warn("Не удалось извлечь цвет из фона (CORS или локальный запуск).");
                    // Дефолтный темный цвет, если скрипт не смог прочитать картинку
                    document.body.style.backgroundColor = '#0a0a0a';
                }
            };

            img.onerror = () => {
                console.error("Файл fon.png не найден рядом с index.html");
                statusBar.setAttribute('content', '#000000');
                // Если картинка не загрузилась, можно показать градиент или заглушку
                bgContainer.style.background = 'linear-gradient(to bottom, #111, #000)';
                bgContainer.classList.add('loaded');
            };
        }

        // Запуск после загрузки DOM
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
