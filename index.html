<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСОВСКИЕ ОТВЕТЫ</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- Цвет статус-бара для мобильных устройств -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Фоновое изображение */
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; /* Резервный цвет */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            /* Отступ 12px от верхнего края */
            margin-top: 12px;
            /* Полностью прозрачный фон */
            background: transparent;
            text-align: center;
            width: 100%;
            z-index: 1001;
        }

        h1 {
            /* Размер шрифта уменьшен в 2 раза (был 2.5rem, стал 1.25rem) */
            font-size: 1.25rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Тень для читаемости на любом фоне */
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .status-bar-mock {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: env(safe-area-inset-top, 0px);
            background-color: black;
            z-index: 1000;
        }

        /* Дополнительный контент страницы */
        .content {
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Имитация черного статус-бара -->
    <div class="status-bar-mock"></div>

    <div class="header-container">
        <h1>ПСОВСКИЕ ОТВЕТЫ</h1>
    </div>

    <div class="content">
        <p>Добро пожаловать на страницу.</p>
    </div>

    <script>
        // Код для проверки загрузки фона
        window.onload = function() {
            const img = new Image();
            img.src = 'fon.png';
            img.onerror = function() {
                console.warn("Файл fon.png не найден рядом с index.html. Используется черный фон.");
            };
        };
    </script>
</body>
</html>
